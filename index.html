<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weathery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay">
    <i class="fa-solid fa-spinner fa-spin"></i>
    <p>Syncing with satellite...</p>
  </div>

  <div class="bento-container">
    <header class="app-header">
      <div class="header-left">
        <div class="location-badge" id="locationBadge" title="Click to use Auto Location">
          <i class="fa-solid fa-location-arrow"></i>
          <span id="cityName">Locating...</span>
        </div>
        <div class="date-display">
          <span id="currentDate">--</span> &nbsp;•&nbsp; <span id="currentTime">--:--</span>
        </div>
      </div>
      
      <div class="header-right">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchInput" placeholder="Search city...">
        </div>
        <button id="darkModeToggle" class="theme-btn" aria-label="Toggle Dark Mode">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <div class="bento-grid">
      <div class="bento-card hero-card">
        <div class="hero-top">
          <i id="mainIcon" class="fa-solid fa-sun weather-icon-large"></i>
          <p class="condition" id="weatherDesc">Loading</p>
        </div>
        <div class="hero-bottom">
          <h1 class="temperature"><span id="currentTemp">--</span>°</h1>
          <p class="feels-like">Feels like <span id="feelsLike">--</span>°</p>
        </div>
      </div>

      <div class="bento-card widget-card">
        <div class="widget-header"><i class="fa-solid fa-wind"></i> Wind</div>
        <div class="widget-value" id="windSpeed">--</div>
        <div class="widget-unit">km/h</div>
      </div>

      <div class="bento-card widget-card">
        <div class="widget-header"><i class="fa-solid fa-droplet"></i> Humidity</div>
        <div class="widget-value" id="humidity">--</div>
        <div class="widget-unit">%</div>
      </div>

      <div class="bento-card widget-card">
        <div class="widget-header"><i class="fa-solid fa-umbrella"></i> Rain Chance</div>
        <div class="widget-value" id="rainChance">--</div>
        <div class="widget-unit">%</div>
      </div>

      <div class="bento-card hourly-card">
        <div class="card-title">Today</div>
        <div class="hourly-flex" id="hourlyForecast">
          </div>
      </div>

      <div class="bento-card daily-card">
        <div class="card-title">7-Day Forecast</div>
        <div class="daily-list" id="dailyForecast">
          </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
